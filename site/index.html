<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>International Diabolo Federation 国际扯铃联盟</title>
<meta name="description" content="The International Diabolo Federation promotes the sport of Diabolo globally — uniting 15 associations across China, Malaysia, Taiwan, Japan and Macau." />
<link rel="canonical" href="./index.html" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<meta property="og:title" content="International Diabolo Federation" />
<meta property="og:description" content="Promoting the sport of Diabolo globally." />
<meta property="og:type" content="website" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', 'Noto Sans TC', 'Noto Sans SC', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  [data-lang-btn].bg-slate-900 { color: #fff; }
</style>
</head>
<body class="bg-white text-slate-900">

<header id="site-header" class="sticky top-0 z-40 border-b border-slate-100 bg-white/80 backdrop-blur"></header>

<main>

  <!-- HERO -->
  <section class="relative overflow-hidden">
    <div id="hero-carousel" class="absolute inset-0"></div>
    <!-- Readability scrim: darker on image, fading to white at the bottom -->
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900/70 via-slate-900/40 to-white"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-slate-900/30 via-transparent to-slate-900/30"></div>
    <div class="relative mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-28 sm:py-36 lg:py-48 text-center">
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-amber-300">Est. 2016</p>
      <h1 class="mt-3 text-4xl font-bold tracking-tight text-white sm:text-6xl [text-shadow:0_2px_24px_rgba(0,0,0,0.45)]" data-i18n="hero.title"></h1>
      <p class="mx-auto mt-5 max-w-2xl text-base text-white/90 sm:text-lg [text-shadow:0_1px_12px_rgba(0,0,0,0.5)]" data-i18n="hero.tagline"></p>
      <div class="mt-8">
        <a href="#introduction" class="inline-flex items-center justify-center rounded-full bg-white px-6 py-3 text-sm font-semibold text-slate-900 hover:bg-slate-100 transition shadow-lg" data-i18n="hero.cta"></a>
      </div>
    </div>
  </section>

  <!-- INTRODUCTION -->
  <section id="introduction" class="py-20 sm:py-28">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="max-w-3xl">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-600" data-i18n="intro.eyebrow"></p>
        <h2 class="mt-2 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl" data-i18n="intro.title"></h2>
        <p class="mt-6 text-base text-slate-600 sm:text-lg" data-i18n="intro.body"></p>
      </div>

      <div class="mt-12 grid gap-6 md:grid-cols-3">
        <div class="rounded-2xl border border-slate-100 bg-slate-50/50 p-6">
          <p class="text-xs font-semibold uppercase tracking-wider text-rose-600" data-i18n="intro.mission.label"></p>
          <p class="mt-3 text-base font-medium text-slate-900" data-i18n="intro.mission.body"></p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-slate-50/50 p-6">
          <p class="text-xs font-semibold uppercase tracking-wider text-rose-600" data-i18n="intro.vision.label"></p>
          <p class="mt-3 text-base font-medium text-slate-900" data-i18n="intro.vision.body"></p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-slate-50/50 p-6">
          <p class="text-xs font-semibold uppercase tracking-wider text-rose-600" data-i18n="intro.scope.label"></p>
          <ul class="mt-3 space-y-2 text-sm text-slate-700">
            <li class="flex gap-2"><span class="text-rose-500">·</span><span data-i18n="intro.scope.body1"></span></li>
            <li class="flex gap-2"><span class="text-rose-500">·</span><span data-i18n="intro.scope.body2"></span></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- MEMBERS -->
  <section id="members" class="bg-slate-50/60 py-20 sm:py-28">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="max-w-3xl">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-600" data-i18n="members.eyebrow"></p>
        <h2 class="mt-2 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl" data-i18n="members.title"></h2>
        <p class="mt-4 text-base text-slate-600" data-i18n="members.body"></p>
      </div>
      <div id="members-grid" class="mt-12 grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5"></div>
    </div>
  </section>

  <!-- JOIN US -->
  <section id="join" class="py-20 sm:py-28">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="max-w-3xl">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-600" data-i18n="join.eyebrow"></p>
        <h2 class="mt-2 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl" data-i18n="join.title"></h2>
      </div>

      <div class="mt-12 grid gap-8 lg:grid-cols-2">
        <div class="rounded-2xl border border-slate-100 bg-white p-8">
          <h3 class="text-lg font-semibold text-slate-900" data-i18n="join.benefits.title"></h3>
          <ul class="mt-4 space-y-3 text-sm text-slate-700">
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-rose-500"></span><span data-i18n="join.benefits.1"></span></li>
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-rose-500"></span><span data-i18n="join.benefits.2"></span></li>
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-rose-500"></span><span data-i18n="join.benefits.3"></span></li>
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-rose-500"></span><span data-i18n="join.benefits.4"></span></li>
          </ul>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-8">
          <h3 class="text-lg font-semibold text-slate-900" data-i18n="join.requirements.title"></h3>
          <ul class="mt-4 space-y-3 text-sm text-slate-700">
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-amber-500"></span><span data-i18n="join.requirements.1"></span></li>
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-amber-500"></span><span data-i18n="join.requirements.2"></span></li>
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-amber-500"></span><span data-i18n="join.requirements.3"></span></li>
            <li class="flex gap-3"><span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-amber-500"></span><span data-i18n="join.requirements.4"></span></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="bg-slate-50/60 py-20 sm:py-28">
    <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
      <div class="text-center">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-600" data-i18n="contact.eyebrow"></p>
        <h2 class="mt-2 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl" data-i18n="contact.title"></h2>
        <p class="mt-4 text-sm text-slate-600">
          <span data-i18n="contact.body"></span>
          <a href="mailto:diabolo.intl@gmail.com" class="font-medium text-slate-900 underline underline-offset-4 hover:text-rose-600">diabolo.intl@gmail.com</a>
        </p>
      </div>

      <form onsubmit="return handleContactSubmit(event)" class="mt-10 grid gap-4 rounded-2xl border border-slate-100 bg-white p-6 sm:p-8">
        <div class="grid gap-4 sm:grid-cols-2">
          <label class="block">
            <span class="text-xs font-medium text-slate-600" data-i18n="form.name"></span>
            <input name="name" type="text" required maxlength="100"
              class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10" />
          </label>
          <label class="block">
            <span class="text-xs font-medium text-slate-600" data-i18n="form.phone"></span>
            <input name="phone" type="tel" maxlength="30"
              class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10" />
          </label>
        </div>
        <label class="block">
          <span class="text-xs font-medium text-slate-600" data-i18n="form.email"></span>
          <input name="email" type="email" required maxlength="255"
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10" />
        </label>
        <label class="block">
          <span class="text-xs font-medium text-slate-600" data-i18n="form.purpose"></span>
          <select name="purpose" required
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10">
            <option value="General Inquiry" data-i18n="form.purpose.general"></option>
            <option value="Join the Federation" data-i18n="form.purpose.join"></option>
            <option value="Complaint" data-i18n="form.purpose.complain"></option>
            <option value="Other" data-i18n="form.purpose.other"></option>
          </select>
        </label>
        <label class="block">
          <span class="text-xs font-medium text-slate-600" data-i18n="form.message"></span>
          <textarea name="message" rows="4" maxlength="2000"
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10"></textarea>
        </label>
        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:items-center sm:justify-between">
          <p class="text-xs text-slate-400" data-i18n="form.note"></p>
          <button type="submit"
            class="inline-flex items-center justify-center rounded-full bg-slate-900 px-6 py-2.5 text-sm font-medium text-white hover:bg-slate-700 transition"
            data-i18n="form.submit"></button>
        </div>
      </form>
    </div>
  </section>

</main>

<footer id="site-footer" class="border-t border-slate-100 bg-white"></footer>

<script src="js/i18n.js"></script>
<script>
  bootPage('home');
  initHeroCarousel([
    'assets/hero/slide1.webp',
    'assets/hero/slide2.webp',
    'assets/hero/slide3.webp',
    'assets/hero/world.webp'
  ]);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grading — International Diabolo Federation</title>
<meta name="description" content="The International Diabolo Grading System — a structured pathway transforming Diabolo into a globally recognised competitive sport." />
<link rel="canonical" href="./grading.html" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter','Noto Sans TC','Noto Sans SC',system-ui,sans-serif;-webkit-font-smoothing:antialiased}</style>
</head>
<body class="bg-white text-slate-900">
<header id="site-header" class="sticky top-0 z-40 border-b border-slate-100 bg-white/80 backdrop-blur"></header>

<main>
  <!-- Intro -->
  <section class="py-16 sm:py-24">
    <div class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-600" data-i18n="nav.grading"></p>
      <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-900 sm:text-5xl" data-i18n="grading.title"></h1>
      <p class="mt-4 max-w-2xl text-base text-slate-600 sm:text-lg" data-i18n="grading.subtitle"></p>

      <p class="mt-10 max-w-3xl text-lg leading-relaxed text-slate-700 sm:text-xl" data-i18n="grading.intro.lede"></p>

      <div class="mt-12 grid gap-5 sm:grid-cols-2">
        <div class="rounded-2xl border border-slate-100 bg-white p-6 transition hover:shadow-sm">
          <div class="flex items-center gap-3">
            <span class="flex h-9 w-9 items-center justify-center rounded-full bg-rose-50 text-sm font-bold text-rose-600">01</span>
            <h3 class="text-base font-semibold text-slate-900" data-i18n="grading.pillar.1.title"></h3>
          </div>
          <p class="mt-3 text-sm leading-relaxed text-slate-600" data-i18n="grading.pillar.1.body"></p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-6 transition hover:shadow-sm">
          <div class="flex items-center gap-3">
            <span class="flex h-9 w-9 items-center justify-center rounded-full bg-amber-50 text-sm font-bold text-amber-600">02</span>
            <h3 class="text-base font-semibold text-slate-900" data-i18n="grading.pillar.2.title"></h3>
          </div>
          <p class="mt-3 text-sm leading-relaxed text-slate-600" data-i18n="grading.pillar.2.body"></p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-6 transition hover:shadow-sm">
          <div class="flex items-center gap-3">
            <span class="flex h-9 w-9 items-center justify-center rounded-full bg-emerald-50 text-sm font-bold text-emerald-600">03</span>
            <h3 class="text-base font-semibold text-slate-900" data-i18n="grading.pillar.3.title"></h3>
          </div>
          <p class="mt-3 text-sm leading-relaxed text-slate-600" data-i18n="grading.pillar.3.body"></p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-6 transition hover:shadow-sm">
          <div class="flex items-center gap-3">
            <span class="flex h-9 w-9 items-center justify-center rounded-full bg-sky-50 text-sm font-bold text-sky-600">04</span>
            <h3 class="text-base font-semibold text-slate-900" data-i18n="grading.pillar.4.title"></h3>
          </div>
          <p class="mt-3 text-sm leading-relaxed text-slate-600" data-i18n="grading.pillar.4.body"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Events -->
  <section class="border-t border-slate-100 bg-white py-16 sm:py-24">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="max-w-3xl">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-600" data-i18n="grading.events.title"></p>
        <h2 class="mt-2 text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl" data-i18n="grading.events.title"></h2>
        <p class="mt-3 text-sm text-slate-600" data-i18n="grading.events.subtitle"></p>
      </div>
      <div id="grading-events-grid" class="mt-10 grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>
    </div>
  </section>
</main>

<footer id="site-footer" class="border-t border-slate-100 bg-white"></footer>
<script src="js/i18n.js"></script>
<script>bootPage('grading');</script>
</body>
</html>
